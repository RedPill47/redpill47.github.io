/* ================= RENDER HELPERS ================= */

function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
function A(url, label) { return `<a href="${url}" target="_blank" rel="noopener">${label}</a>`; }

function card(o) {
  const title = o.url ? A(o.url, esc(o.title)) : esc(o.title);
  return `<div class="card">
    <div class="card-head"><span class="card-title">${title}</span><span class="card-meta">${esc(o.meta || "")}</span></div>
    ${o.sub ? `<div class="card-sub">${esc(o.sub)}</div>` : ""}
    ${o.bullets ? `<ul>${o.bullets.map((b) => `<li>${b}</li>`).join("")}</ul>` : ""}
  </div>`;
}

function getTopic(id) {
  if (id && id.startsWith("p:")) {
    const pid = id.slice(2);
    if (PROJECT_DEEP[pid]) {
      const p = PROJECTS.find((x) => x.id === pid);
      return { answer: () => projectAnswer(pid), recent: `Tell me about ${p.title.split(" — ")[0]}`, followups: FOLLOWUPS.project };
    }
    return null;
  }
  const t = TOPICS[id];
  return t ? { ...t, followups: FOLLOWUPS[id] } : null;
}

  { keywords: ["thank", "thanks", "merci"], answer: () => `<p>You're welcome! If you'd like to go deeper, the ${A(LINKS.github.url, "GitHub repos")} and ${A(LINKS.scholar.url, "papers")} are all public.</p>` },
  { keywords: ["claude", "anthropic", "ai are you", "real claude", "model"], answer: () => `<p>I'm not the real Claude — just a portfolio wearing its design as an homage. No LLM is running here: every answer is hand-written and 100% grounded. You could say I'm the only chat assistant with a <em>0% hallucination rate</em>.</p><p class="muted small">The actual Claude lives at <a href="https://claude.ai" target="_blank" rel="noopener">claude.ai</a>. Not affiliated with Anthropic.</p>` },
];

function fallback() {
  return `<p>That one's a bit outside my training data — I only know about Hedi. On that topic, though, I'm exhaustive. Here's what you can ask me:</p>
    <div id="chips" style="justify-content:flex-start;margin-top:10px">${chipButtons()}</div>
    <p class="muted small">For everything else, why don't you ask <a href="https://claude.ai" target="_blank" rel="noopener">the real Claude</a>? I hear he's quite good.</p>`;
}

/* ================= CHAT LOGIC ================= */

const $ = (s) => document.querySelector(s);
const chat = $("#chat");
const inner = $("#chat-inner");
const q = $("#q");
const send = $("#send");
let busy = false;

/* starburst SVG */
function sparkSVG(size) {
  const spokes = [];
  for (let i = 0; i < 8; i++) {
    spokes.push(`<line x1="12" y1="12" x2="${12 + 10 * Math.cos((i * Math.PI) / 4)}" y2="${12 + 10 * Math.sin((i * Math.PI) / 4)}" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>`);
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none">${spokes.join("")}</svg>`;
}
document.querySelectorAll(".spark").forEach((el) => { el.innerHTML = sparkSVG(el.dataset.size || 20); });

function newSpark(size, extra = "") {
  const s = document.createElement("span");
  s.className = "spark" + extra;
  s.innerHTML = sparkSVG(size);
  return s;
}

/* whole-word match (with optional plural) so "hi" doesn't fire inside "history";
   phrases still use includes */
function hasKw(t, k) {
  if (k.includes(" ")) return t.includes(k);
  const plural = k.length > 2 ? "(s|es)?" : "";
  return new RegExp(`\\b${k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}${plural}\\b`).test(t);
}

function matchTopic(text) {
  const t = text.toLowerCase();
  for (const s of SMALLTALK) if (s.priority && s.keywords.some((k) => hasKw(t, k))) return { answer: s.answer, id: null };
  for (const [pid, p] of Object.entries(PROJECT_DEEP)) {
    if (p.keywords.some((k) => hasKw(t, k))) return { id: "p:" + pid };
  }
  let best = null, bestScore = 0;
  for (const [id, topic] of Object.entries(TOPICS)) {
    const score = topic.keywords.filter((k) => hasKw(t, k)).length;
    if (score > bestScore) { bestScore = score; best = { id }; }
  }
  if (best) return best;
  for (const s of SMALLTALK) if (s.keywords.some((k) => hasKw(t, k))) return { answer: s.answer, id: null };
  return { answer: fallback, id: null };
}

function scrollDown(smooth = true) {
  chat.scrollTo({ top: chat.scrollHeight, behavior: smooth ? "smooth" : "auto" });
}

function ask(text, forcedTopic) {
  if (busy || !text.trim()) return;
  busy = true;
  send.disabled = true;
  const greeting = $("#greeting");
  if (greeting) greeting.remove();

  const u = document.createElement("div");
  u.className = "msg-u";
  u.innerHTML = `<div class="bubble"></div>`;
  u.querySelector(".bubble").textContent = text.trim();
  inner.appendChild(u);

  const a = document.createElement("div");
  a.className = "msg-a";
  const sp = newSpark(24, " thinking");
  const body = document.createElement("div");
  body.className = "body";
  body.innerHTML = `<span class="thinking-label">Thinking…</span>`;
  a.append(sp, body);
  inner.appendChild(a);
  scrollDown();

  let id = null, answer, followups = null;
  const forced = forcedTopic && getTopic(forcedTopic);
  if (forced) {
    id = forcedTopic; answer = forced.answer; followups = forced.followups;
  } else {
    const m = matchTopic(text);
    id = m.id || null;
    if (id) { const tp = getTopic(id); answer = tp.answer; followups = tp.followups; }
    else answer = m.answer;
  }
  setActive(id);
  if (id) history.replaceState(null, "", "#" + id);
  track(id ? "ask/" + id : "unmatched/" + text.trim().toLowerCase().slice(0, 80));

  const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
  setTimeout(() => {
    sp.classList.remove("thinking");
    body.classList.add("reveal");
    body.innerHTML = answer();
    [...body.children].forEach((el, i) => { el.style.animationDelay = `${Math.min(i * 110, 1400)}ms`; });

    const actions = document.createElement("div");
    actions.className = "actions";
    actions.innerHTML = `
      <button data-act="copy">⧉ Copy</button>
      <button data-act="up">👍</button>
      <button data-act="down">👎</button>`;
    actions.addEventListener("click", (e) => {
      const act = e.target.closest("[data-act]")?.dataset.act;
      if (act === "copy") { navigator.clipboard?.writeText(body.innerText).then(() => toast("Copied to clipboard")); }
      if (act === "up") toast("Thanks! Hedi appreciates it.");
      if (act === "down") toast("Noted. Hedi will retrain himself.");
    });
    inner.appendChild(actions);

    if (followups && followups.length) {
      const fu = document.createElement("div");
      fu.className = "followups";
      fu.innerHTML = followups.map(([label, tid]) => `<button class="chip" data-q="${label}" data-topic="${tid}">${label}</button>`).join("");
      inner.appendChild(fu);
    }

    scrollDown();
    busy = false;
    send.disabled = false;
  }, reduced ? 60 : 550 + Math.random() * 450);
}

/* composer */
send.addEventListener("click", () => { ask(q.value); q.value = ""; autosize(); });
q.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(q.value); q.value = ""; autosize(); }
});
function autosize() { q.style.height = "auto"; q.style.height = Math.min(q.scrollHeight, 120) + "px"; }
q.addEventListener("input", autosize);

/* chips */
function chipButtons() {
  return Object.entries(TOPICS).filter(([, t]) => t.chip)
    .map(([id, t]) => `<button class="chip" data-q="${t.chip}" data-topic="${id}">${t.chip}</button>`).join("");
}
$("#chips").innerHTML = chipButtons();
document.addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if (chip) ask(chip.dataset.q, chip.dataset.topic);
});

/* sidebar recents */
const recents = $("#recents");
Object.entries(TOPICS).forEach(([id, t]) => {
  const b = document.createElement("button");
  b.className = "recent";
  b.dataset.topic = id;
  b.textContent = t.recent;
  b.addEventListener("click", () => { ask(t.recent, id); closeSidebar(); });
  recents.appendChild(b);
});
function setActive(id) {
  document.querySelectorAll(".recent").forEach((r) => r.classList.toggle("active", r.dataset.topic === id));
}

/* new chat */
$("#new-chat").addEventListener("click", () => {
  history.replaceState(null, "", location.pathname + location.search);
  inner.innerHTML = "";
  const g = document.createElement("div");
  g.id = "greeting";
  g.innerHTML = `<span class="spark"></span>
    <h1 class="serif">${greetLine()}</h1>
    <p>I'm Hedi's portfolio. Ask me anything about him — his research, projects, or papers.</p>
    <div id="chips">${chipButtons()}</div>`;
  g.querySelector(".spark").innerHTML = sparkSVG(42);
  inner.appendChild(g);
  setActive(null);
  closeSidebar();
});

/* greeting line by time of day */
function greetLine() {
  const h = new Date().getHours();
  if (h < 5)  return "Burning the midnight oil?";
  if (h < 12) return "Good morning.";
  if (h < 18) return "Good afternoon.";
  return "Good evening.";
}
$("#greet-line").textContent = greetLine();

/* dark mode */
const modeBtn = $("#mode-btn");
function applyMode(m) {
  document.documentElement.dataset.mode = m;
  $("#mode-label").textContent = m === "light" ? "Dark mode" : "Light mode";
  try { localStorage.setItem("claude-mode", m); } catch (e) {}
}
modeBtn.addEventListener("click", () => {
  applyMode(document.documentElement.dataset.mode === "light" ? "dark" : "light");
});
try {
  const saved = localStorage.getItem("claude-mode");
  if (saved) applyMode(saved);
  else if (matchMedia("(prefers-color-scheme: dark)").matches) applyMode("dark");
} catch (e) {}

/* mobile sidebar */
const sidebar = $("#sidebar");
const scrim = $("#scrim");
$("#burger").addEventListener("click", () => {
  sidebar.classList.toggle("open");
  scrim.classList.toggle("show", sidebar.classList.contains("open"));
});
scrim.addEventListener("click", closeSidebar);
function closeSidebar() { sidebar.classList.remove("open"); scrim.classList.remove("show"); }

/* toast */
let toastTimer;
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

/* ---- analytics (GoatCounter) ----
   Privacy-friendly, no cookies. To enable: create a free site at goatcounter.com
   and put its code below (e.g. "hedi" for hedi.goatcounter.com). Leave empty to disable.
   Unmatched questions are logged as events — they tell you what content to add next. */
const GOATCOUNTER = "";
if (GOATCOUNTER) {
  const s = document.createElement("script");
  s.async = true;
  s.dataset.goatcounter = `https://${GOATCOUNTER}.goatcounter.com/count`;
  s.src = "https://gc.zgo.at/count.js";
  document.head.appendChild(s);
}
function track(path) {
  if (GOATCOUNTER && window.goatcounter && window.goatcounter.count) {
    window.goatcounter.count({ path, title: "", event: true });
  }
}

/* ---- deep links: #projects, #publications, #p:atlas, ... ---- */
function askFromHash() {
  const h = decodeURIComponent(location.hash.slice(1));
  if (!h) return;
  const t = getTopic(h);
  if (t) ask(t.recent || h, h);
}
window.addEventListener("hashchange", askFromHash);
askFromHash();
</script>
